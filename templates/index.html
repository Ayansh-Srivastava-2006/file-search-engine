<!DOCTYPE html>
<html>

<head>
    <title>File Search Engine</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial;
        }

        .result-card {
            background: #1e293b;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .result-card h3 {
            color: #38bdf8;
        }

        .path {
            font-size: 12px;
            color: #94a3b8;
        }

        .snippet mark {
            background: #22c55e;
            color: black;
            padding: 2px;
        }
    </style>
</head>

<body>

    <h1>🔍 File Search Engine</h1>

    <form method="POST">
        <input type="text" name="query" placeholder="Search..." required>

        <select name="type">
            <option value="all">All</option>
            <option value="pdf">PDF</option>
            <option value="txt">Text</option>
        </select>

        <button type="submit">Search</button>
    </form>
    <form action="/reindex" method="POST">
        <button type="submit">🔄 Reindex Files</button>
    </form>
    <div class="results">
        {% for title, path, snippet in results %}
        <div class="result-card">
            <h3>{{ title }}</h3>
            <p class="path">{{ path }}</p>
            <p class="snippet">{{ snippet | safe }}</p>
        </div>
        {% endfor %}
    </div>
    <select name="type">
        <option value="all" selected>All</option>
        <option value="pdf">PDF</option>
        <option value="txt">Text</option>
    </select>

</body>

</html>
